name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost/dummy
      AUTH_SECRET: ci-placeholder-secret
      AUTH_URL: http://localhost:3000
      DATAGSM_CLIENT_ID: dummy
      DATAGSM_CLIENT_SECRET: dummy
      DATAGSM_API_KEY: dummy
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy
      CLOUDINARY_API_SECRET: dummy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome 검사
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Success Discord Notification
        uses: sarisia/actions-status-discord@v1.15.5
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: '✅ CI 성공'
          status: success
          content: 'PR을 확인해주세요.'
          username: themoment-blog bot
          color: 0x4CAF50

      - name: Failure Discord Notification
        uses: sarisia/actions-status-discord@v1.15.5
        if: failure()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: '❌ CI 실패'
          content: '에러를 확인해주세요.'
          status: failure
          username: themoment-blog bot
          color: 0xe74c3c
